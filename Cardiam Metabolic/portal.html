<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiam Metabolic™ Campaign Portal</title>
<!-- DESIGN: Landing page (3-sec animation, slideInUp+bounce) | Sign-in card (Access to CMbriX text) | Logos (GlobalPharma + MD only) | Watermark (CMbriX 5rem @-20deg) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --background:  #f9fafb;
    --card:        #ffffff;
    --border:      #e5e7eb;
    --input:       #e5e7eb;
    --foreground:  #111827;
    --muted:       #6b7280;
    --primary:     #1e3a8a;
    --primary-fg:  #ffffff;
    --ring:        #3b5fc0;
    --destructive: #dc2626;
    --secondary:   #3b82f6;
    --accent:      #c8a84b;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--background);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    position: relative;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── geometric pattern overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23203080' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── LANDING PAGE ── */
  .landing-page {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1e3a8a 0%, #0f2260 50%, #1a2d5a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 1;
    transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
    visibility: visible;
  }

  .landing-page.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .landing-content {
    text-align: center;
    z-index: 1;
  }

  .landing-welcome {
    font-size: 3.5rem;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    animation: slideInUp 1s ease-out 0.3s both;
  }

  .landing-subtitle {
    font-size: 1.25rem;
    color: rgba(255, 255, 255, 0.75);
    margin-bottom: 40px;
    animation: slideInUp 1s ease-out 0.6s both;
  }

  .landing-arrow {
    font-size: 2rem;
    color: #c8a84b;
    animation: bounce 2s infinite 1s;
  }

  @keyframes slideInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes bounce {
    0%, 100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-10px);
    }
  }

  .landing-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(200, 168, 75, 0.15) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 0.3;
    }
    50% {
      opacity: 0.7;
    }
  }

  /* ── top accent line ── */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
    z-index: 100;
  }

  /* ── main wrapper ── */
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 750px;
    padding: 0 24px;
    padding-top: 80px;
    padding-bottom: 80px;
  }

  .wrapper::before {
    content: 'CMbriX';
    position: fixed;
    font-size: 5rem;
    font-weight: 900;
    color: rgba(30, 58, 138, 0.05);
    letter-spacing: 4px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-20deg);
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
  }

  /* ── logos section ── */
  .logos-section-title {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #8a96b0;
    margin-bottom: 28px;
    margin-top: 50px;
    text-align: center;
  }

  .logos-carousel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 1px 12px rgba(0,0,0,0.05);
    padding: 48px;
    margin-bottom: 80px;
  }

  .carousel-scroll {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    width: 100%;
  }

  .carousel-scroll::-webkit-scrollbar {
    display: none;
  }

  .logo-card {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background: #f8fafb;
    border-radius: 10px;
    min-height: 200px;
    transition: all 0.2s ease;
  }

  .logo-card:nth-child(1) {
    grid-column: 1;
  }

  .logo-card:nth-child(2) {
    grid-column: 2;
  }

  .logo-card:nth-child(3) {
    grid-column: 3;
  }

  .logo-card:nth-child(4) {
    grid-column: 1;
  }

  .logo-card:nth-child(5) {
    grid-column: 2;
  }

  .logo-card:nth-child(6) {
    grid-column: 3;
  }

  .logo-card:nth-child(7) {
    grid-column: 1;
  }

  .logo-card:nth-child(8) {
    grid-column: 2;
  }

  .logo-card:nth-child(9) {
    grid-column: 3;
  }

  .logo-card:hover {
    background: #f0f4f8;
    box-shadow: 0 2px 6px rgba(30,58,138,0.1);
    transform: translateY(-1px);
  }

  .logo-card img {
    max-height: 380px;
    max-width: 98%;
    object-fit: contain;
    display: block;
  }}

  @media (max-width: 768px) {
    .logos-carousel {
      padding: 10px;
    }

    .logo-card {
      min-width: 110px;
      min-height: 200px;
      padding: 12px;
    }

    .logo-card img {
      max-height: 180px;
    }
  }

  @media (max-width: 480px) {
    .carousel-scroll {
      gap: 10px;
    }

    .logo-card {
      min-width: 100px;
      min-height: 150px;
      padding: 10px;
    }

    .logo-card img {
      max-height: 130px;
    }
  }

  /* ── old logos styles (keeping for reference but unused) ── */
  .logos {
    display: none;
  }

  .logo-brand {
    display: none;
  }

  .logo-divider {
    display: none;
  }

  /* ── card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 2px 24px -4px rgba(0,0,0,0.08);
    padding: 40px;
    margin-top: 0;
    margin-bottom: 60px;
    width: 100%;
    margin-left: auto;
    margin-right: auto;
  }

  .card-head {
    margin-bottom: 24px;
  }

  .card-head h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--foreground);
    letter-spacing: -0.025em;
    line-height: 1.2;
  }

  .card-head p {
    font-size: 0.8125rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── form fields ── */
  .form-fields {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--foreground);
    margin-bottom: 6px;
  }

  .label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .label-row label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--foreground);
    margin-bottom: 0;
  }

  .forgot-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--primary);
    font-family: 'Inter', sans-serif;
    padding: 0;
    transition: opacity 0.15s;
  }

  .forgot-btn:hover {
    opacity: 0.75;
  }

  .input-wrap {
    position: relative;
  }

  .field input[type="text"],
  .field input[type="password"] {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--input);
    border-radius: 6px;
    background: var(--background);
    color: var(--foreground);
    font-size: 0.875rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: box-shadow 0.15s, border-color 0.15s;
  }

  .field input[type="text"]::placeholder,
  .field input[type="password"]::placeholder {
    color: #9ca3af;
    font-weight: 300;
  }

  .field input:focus {
    border-color: transparent;
    box-shadow: 0 0 0 2px var(--ring);
  }

  .field input.has-toggle {
    padding-right: 44px;
  }

  .field input.is-error {
    border-color: var(--destructive);
    box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.3);
  }

  .field input.is-error:focus {
    box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.4);
  }

  .err-text {
    font-size: 0.75rem;
    color: var(--destructive);
    margin-top: 4px;
    display: none;
  }

  /* show/hide password button */
  .pw-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    padding: 0;
    transition: color 0.15s;
    line-height: 0;
  }

  .pw-toggle:hover {
    color: var(--foreground);
  }

  /* remember me */
  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .remember-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
    border-radius: 3px;
    border: 1px solid var(--input);
    flex-shrink: 0;
  }

  .remember-row label {
    font-size: 0.875rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  /* submit button */
  .btn-submit {
    width: 100%;
    height: 44px;
    background: var(--primary);
    color: var(--primary-fg);
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, opacity 0.15s, transform 0.1s;
  }

  .btn-submit:hover:not(:disabled) {
    background: #163275;
  }

  .btn-submit:active:not(:disabled) {
    background: #122a63;
    transform: scale(0.995);
  }

  .btn-submit:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring);
  }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* spinner */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── footer ── */
  .footer {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 24px;
  }

  /* ── responsive ── */
  @media (max-width: 768px) {
    .wrapper {
      padding-top: 60px;
      padding-bottom: 60px;
    }
    .carousel-scroll {
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .logos-carousel {
      padding: 36px;
      margin-bottom: 60px;
    }
    .logo-card {
      min-height: 200px;
      padding: 32px;
    }
    .logo-card img {
      max-height: 220px;
      max-width: 95%;
    }
  }

  @media (max-width: 640px) {
    .wrapper {
      max-width: 100%;
      padding-top: 50px;
      padding-bottom: 50px;
    }
    .card {
      padding: 28px;
      margin-top: 0;
      margin-bottom: 40px;
    }
    .card-head h1 {
      font-size: 1.25rem;
    }
    .logos-section-title {
      margin-top: 30px;
      margin-bottom: 20px;
    }
    .logos-carousel {
      padding: 24px;
      margin-bottom: 50px;
    }
    .carousel-scroll {
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .logo-card:nth-child(1) {
      grid-column: 1;
    }
    .logo-card:nth-child(2) {
      grid-column: 2;
    }
    .logo-card:nth-child(3) {
      grid-column: 1;
    }
    .logo-card:nth-child(4) {
      grid-column: 2;
    }
    .logo-card:nth-child(5) {
      grid-column: 1;
    }
    .logo-card:nth-child(6) {
      grid-column: 2;
    }
    .logo-card:nth-child(7) {
      grid-column: 1;
    }
    .logo-card:nth-child(8) {
      grid-column: 2;
    }
    .logo-card:nth-child(9) {
      grid-column: 1;
    }
    .logo-card {
      min-height: 130px;
      padding: 18px;
    }
    .logo-card img {
      max-height: 110px;
    }
  }

  @media (max-width: 480px) {
    .wrapper {
      padding-top: 40px;
      padding-bottom: 40px;
    }
    .card {
      margin-top: 0;
      margin-bottom: 30px;
      padding: 20px;
    }
    .logos-section-title {
      margin-top: 20px;
      margin-bottom: 14px;
      font-size: 0.8rem;
    }
    .logos-carousel {
      padding: 16px;
      margin-bottom: 30px;
    }
    .carousel-scroll {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .logo-card {
      min-height: 120px;
      padding: 12px;
    }
    .logo-card img {
      max-height: 95px;
    }
  }

</style>
</head>
<body>

  <div class="top-bar"></div>

  <!-- LANDING PAGE -->
  <div class="landing-page" id="landingPage">
    <div class="landing-content">
      <h1 class="landing-welcome">Welcome to<br>CMbriX</h1>
      <p class="landing-subtitle">Campaign Portal</p>
      <div class="landing-arrow">↓</div>
    </div>
  </div>

  <div class="wrapper">

    <!-- Logo Section - Fixed Layout -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:60px; padding:50px 40px; margin-bottom:60px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; align-items:center;">
      <div style="display:flex; align-items:center; justify-content:center; min-height:160px;">
        <img src="globalpharma logo_page-0001.png" alt="GlobalPharma" style="height:130px; width:auto; object-fit:contain;">
      </div>
      <div style="display:flex; align-items:center; justify-content:center; min-height:160px;">
        <img src="Emiros logo_page-0001.png" alt="Emiros" style="height:130px; width:auto; object-fit:contain;">
      </div>
    </div>

    <!-- Card -->
    <div class="card">

      <div class="card-head">
        <h1>Sign in</h1>
        <p>Access to CMbriX</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-fields">

          <!-- Username -->
          <div class="field">
            <label for="username">Email or Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your email or username"
              autocomplete="username"
            >
            <div class="err-text" id="usernameErr">Please enter your email or username</div>
          </div>

          <!-- Password -->
          <div class="field">
            <div class="label-row">
              <label for="password">Password</label>
              <button type="button" class="forgot-btn">Forgot password?</button>
            </div>
            <div class="input-wrap">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                class="has-toggle"
              >
              <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                <!-- eye-off (default: password hidden) -->
                <svg id="iconOff" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <!-- eye-on -->
                <svg id="iconOn" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                     style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="err-text" id="passwordErr">Please enter your password</div>
          </div>

          <!-- Remember me -->
          <div class="remember-row">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Keep me signed in</label>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-submit" id="submitBtn">
            Sign in
          </button>

        </div>
      </form>

    </div>

    <!-- Footer -->
    <p class="footer">
      &copy; <span id="yr"></span> Mind Communication. All rights reserved.
    </p>

  </div>

  <script>
    // Landing page animation
    window.addEventListener('load', () => {
      setTimeout(() => {
        const landing = document.getElementById('landingPage');
        if (landing) {
          landing.classList.add('hidden');
        }
      }, 3000);
    });

    // year
    document.getElementById('yr').textContent = new Date().getFullYear();

    // password toggle
    const pwInput  = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const iconOff  = document.getElementById('iconOff');
    const iconOn   = document.getElementById('iconOn');

    pwToggle.addEventListener('click', (e) => {
      e.preventDefault();
      const hidden = pwInput.type === 'password';
      pwInput.type   = hidden ? 'text' : 'password';
      iconOff.style.display = hidden ? 'none' : '';
      iconOn.style.display  = hidden ? '' : 'none';
    });

    // form
    const form       = document.getElementById('loginForm');
    const submitBtn  = document.getElementById('submitBtn');
    const usernameIn = document.getElementById('username');
    const passwordIn = document.getElementById('password');
    const usernameErr = document.getElementById('usernameErr');
    const passwordErr = document.getElementById('passwordErr');

    function clearError(input, errEl) {
      input.classList.remove('is-error');
      errEl.style.display = 'none';
    }

    function showError(input, errEl) {
      input.classList.add('is-error');
      errEl.style.display = 'block';
    }

    usernameIn.addEventListener('input', () => clearError(usernameIn, usernameErr));
    passwordIn.addEventListener('input', () => clearError(passwordIn, passwordErr));

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let valid = true;

      if (!usernameIn.value.trim()) {
        showError(usernameIn, usernameErr);
        valid = false;
      }
      if (!passwordIn.value) {
        showError(passwordIn, passwordErr);
        valid = false;
      }

      if (!valid) return;

      // loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <div class="spinner"></div>
        Signing in&hellip;
      `;

      // store session and redirect
      setTimeout(() => {
        const userEmail = usernameIn.value.trim();
        sessionStorage.setItem('portalUser', userEmail);
        
        // Check if owner email
        const ownerEmails = ['abdullahbekbashy@gmail.com', 'boodyalbekbashy@gmail.com'];
        if (ownerEmails.includes(userEmail.toLowerCase())) {
          sessionStorage.setItem('ownerSession', userEmail);
          window.location.href = 'owner_dashboard.html';
        } else {
          window.location.href = 'main.html';
        }
      }, 1200);
    });
  </script>

</body>
</html>
